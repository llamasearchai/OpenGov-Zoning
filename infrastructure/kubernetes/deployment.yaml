apiVersion: apps/v1
kind: Deployment
metadata:
  name: opengov-zoning-api
  namespace: opengov-zoning
  labels:
    app: opengov-zoning-api
    version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: opengov-zoning-api
  template:
    metadata:
      labels:
        app: opengov-zoning-api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: opengovzoning/api:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 8001
          name: metrics
          protocol: TCP
        env:
        - name: APP_ENV
          value: "production"
        - name: DEBUG
          value: "false"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8000"
        - name: WORKERS
          value: "4"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: opengov-zoning-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: opengov-zoning-secrets
              key: redis-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: opengov-zoning-secrets
              key: openai-api-key
        - name: OLLAMA_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: opengov-zoning-config
              key: ollama-base-url
        - name: LOG_LEVEL
          value: "INFO"
        - name: PROMETHEUS_ENABLED
          value: "true"
        - name: OTEL_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "opengov-zoning-api"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      - name: nginx
        image: nginx:1.24-alpine
        ports:
        - containerPort: 80
          name: nginx
          protocol: TCP
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop:
            - ALL
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command: ['sh', '-c', 'until pg_isready -h postgres -p 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-redis
        image: redis:7-alpine
        command: ['sh', '-c', 'until redis-cli -h redis -p 6379 ping; do echo waiting for redis; sleep 2; done;']
      - name: database-migrations
        image: opengovzoning/api:1.0.0
        command: ['python', '-m', 'alembic', 'upgrade', 'head']
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: opengov-zoning-secrets
              key: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: opengov-zoning-api
  namespace: opengov-zoning
  labels:
    app: opengov-zoning-api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: opengov-zoning-api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opengov-zoning-api
  namespace: opengov-zoning
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "60s"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.opengovzoning.com
    secretName: opengov-zoning-tls
  rules:
  - host: api.opengovzoning.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: opengov-zoning-api
            port:
              number: 8000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opengov-zoning-api-pdb
  namespace: opengov-zoning
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: opengov-zoning-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opengov-zoning-config
  namespace: opengov-zoning
data:
  ollama-base-url: "http://ollama.opengov-zoning.svc.cluster.local:11434"
  gis-api-base: "https://gis.company.com/api"
  log-level: "INFO"
  log-format: "json"
---
