name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pyproject.toml'
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Run tests
      run: |
        pip install -r requirements-dev.txt
        python -m pytest --cov=src --cov-report=xml --cov-report=html

    - name: Build package
      run: python -m build

    - name: Generate SBOM
      uses: anchore/sbom-action@v0.20.8
      with:
        path: .
        format: cyclonedx-json
        artifact-name: sbom.cyclonedx.json

    - name: Generate OpenAPI schema
      run: |
        pip install -e .
        python -c "
        from src.opengovzoning.web.app import app
        import json
        with open('static/api/openapi.json', 'w') as f:
            json.dump(app.openapi(), f, indent=2)
        "

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version || github.run_number }}
        name: Release v${{ github.event.inputs.version || github.run_number }}
        body: |
          ## What's Changed

          See [CHANGELOG.md](CHANGELOG.md) for details.

          ## Assets

          - OpenAPI Schema: `openapi.json`
          - SBOM: `sbom.cyclonedx.json`
          - Coverage Report: `htmlcov/index.html`

        files: |
          dist/*
          static/api/openapi.json
          sbom.cyclonedx.json
          htmlcov/index.html
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}